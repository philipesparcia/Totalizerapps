<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Gross Reporting System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        .header-inputs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; background: #e9ecef; padding: 15px; border-radius: 8px; }
        .header-inputs div { flex: 1; min-width: 140px; }
        
        .tables-container { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .tables-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; } }

        .ton-section { border: 1px solid #ddd; border-radius: 8px; background: #fff; overflow: hidden; }
        .ton-header { background: #007bff; color: white; padding: 12px; text-align: center; font-size: 1.1rem; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; text-align: left; border-bottom: 1px solid #eee; }
        
        input[type="number"], select, input[type="date"] { 
            width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 10px; 
            box-sizing: border-box; font-size: 16px; 
        }
        .row-label { font-weight: bold; width: 60px; text-align: center; color: #555; font-size: 14px; background: #f8f9fa; display: inline-block; padding: 8px 0; border-radius: 4px; }
        
        .footer-row { font-weight: bold; background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; position: sticky; bottom: 10px; }
        .btn-save { background: #007bff; color: white; border: none; padding: 18px; cursor: pointer; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-pdf { background: #dc3545; color: white; border: none; padding: 18px; cursor: pointer; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        
        .hits-input { background: #fff0f0; border: 1px solid #ffc1c1 !important; width: 80px !important; text-align: right; color: red; font-weight: bold; }

        /* MODAL STYLES */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 80%; width: 300px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); animation: fadeIn 0.3s ease; }
        .modal-content h2 { margin-top: 0; color: #333; }
        .modal-btn { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        @keyframes fadeIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>TON GROSS TRACKER</h1>
    
    <div class="header-inputs">
        <div><label><b>Shift:</b></label>
            <select id="shiftTime">
                <option value="2PM">2 PM</option>
                <option value="5PM">5 PM</option>
                <option value="9PM" selected>9 PM</option>
            </select>
        </div>
        <div><label><b>Date:</b></label><input type="date" id="reportDate"></div>
    </div>

    <div class="tables-container">
        <div class="ton-section">
            <div class="ton-header">TON 1</div>
            <table id="table-ton1"><tbody id="body-ton1">
                <tr><td><span class="row-label">P1</span></td><td><input type="number" inputmode="decimal" class="val-ton1" oninput="calculate('ton1')"></td></tr>
                <tr><td><span class="row-label">P2</span></td><td><input type="number" inputmode="decimal" class="val-ton1" oninput="calculate('ton1')"></td></tr>
            </tbody></table>
            <button class="btn-add" onclick="addRow('ton1')">+ Add Row</button>
            <div class="footer-row"><span>TOTAL:</span> <span id="total-ton1">0</span></div>
            <div class="footer-row"><span>HITS:</span> <input type="number" id="hits-ton1" class="hits-input" value="0"></div>
        </div>

        <div class="ton-section">
            <div class="ton-header">TON 2</div>
            <table id="table-ton2"><tbody id="body-ton2">
                <tr><td><span class="row-label">P1</span></td><td><input type="number" inputmode="decimal" class="val-ton2" oninput="calculate('ton2')"></td></tr>
                <tr><td><span class="row-label">P2</span></td><td><input type="number" inputmode="decimal" class="val-ton2" oninput="calculate('ton2')"></td></tr>
            </tbody></table>
            <button class="btn-add" onclick="addRow('ton2')">+ Add Row</button>
            <div class="footer-row"><span>TOTAL:</span> <span id="total-ton2">0</span></div>
            <div class="footer-row"><span>HITS:</span> <input type="number" id="hits-ton2" class="hits-input" value="0"></div>
        </div>

        <div class="ton-section">
            <div class="ton-header">TON 3</div>
            <table id="table-ton3"><tbody id="body-ton3">
                <tr><td><span class="row-label">P1</span></td><td><input type="number" inputmode="decimal" class="val-ton3" oninput="calculate('ton3')"></td></tr>
                <tr><td><span class="row-label">P2</span></td><td><input type="number" inputmode="decimal" class="val-ton3" oninput="calculate('ton3')"></td></tr>
            </tbody></table>
            <button class="btn-add" onclick="addRow('ton3')">+ Add Row</button>
            <div class="footer-row"><span>TOTAL:</span> <span id="total-ton3">0</span></div>
            <div class="footer-row"><span>HITS:</span> <input type="number" id="hits-ton3" class="hits-input" value="0"></div>
        </div>
    </div>

    <div class="action-btns">
        <button class="btn-save" onclick="saveToSheet()">SAVE TO SHEET</button>
        <button class="btn-pdf" onclick="generatePDF()">GENERATE PDF</button>
    </div>
</div>

<div id="saveModal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modalTitle">Saving...</h2>
        <p id="modalMsg">Please wait, your data is being sent to Google Sheets.</p>
        <button id="modalBtn" class="modal-btn" style="display:none;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    document.getElementById('reportDate').valueAsDate = new Date();

    function addRow(section) {
        const tbody = document.getElementById(`body-${section}`);
        const rowCount = tbody.rows.length + 1;
        const row = tbody.insertRow();
        row.innerHTML = `<td><span class="row-label">P${rowCount}</span></td><td><input type="number" inputmode="decimal" class="val-${section}" oninput="calculate('${section}')"></td>`;
    }

    function calculate(section) {
        const inputs = document.getElementsByClassName(`val-${section}`);
        let total = 0;
        for (let input of inputs) { total += Number(input.value) || 0; }
        document.getElementById(`total-${section}`).innerText = total.toLocaleString();
    }

    function showModal(title, msg, showBtn) {
        document.getElementById('saveModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('modalBtn').style.display = showBtn ? 'inline-block' : 'none';
    }

    function closeModal() {
        document.getElementById('saveModal').style.display = 'none';
    }

    function saveToSheet() {
        const btn = document.querySelector('.btn-save');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyJT26PTN_ouH6tp52Ny0SZO_xhs_m8fUzE7hwIJbFW862My67d9JFPYkajIv2muQbHfQ/exec';
        
        btn.disabled = true;
        showModal("Saving...", "Please wait, your data is being sent to Google Sheets.", false);

        const date = document.getElementById('reportDate').value;
        const shift = document.getElementById('shiftTime').value;
        let payload = [];

        ['ton1', 'ton2', 'ton3'].forEach((secId, index) => {
            const title = "TON " + (index + 1);
            const tableRows = document.getElementById(`body-${secId}`).rows;
            for (let i = 0; i < tableRows.length; i++) {
                const label = tableRows[i].cells[0].innerText;
                const value = tableRows[i].cells[1].querySelector('input').value;
                if(value && value !== "0" && value !== "") {
                    payload.push({ date: date, shift: shift, category: title, label: label, value: value });
                }
            }
            const hits = document.getElementById(`hits-${secId}`).value;
            if(hits && hits !== "0") {
                payload.push({ date: date, shift: shift, category: title, label: 'HITS', value: hits });
            }
        });

        if(payload.length === 0) { 
            showModal("No Data", "There is no information to save.", true);
            btn.disabled = false;
            return; 
        }

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            showModal("Success!", "Your data has been recorded in the sheet.", true);
            btn.disabled = false;
        })
        .catch(error => {
            showModal("Error", "Something went wrong: " + error, true);
            btn.disabled = false;
        });
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const time = document.getElementById('shiftTime').value;
        const date = document.getElementById('reportDate').value;
        doc.setFontSize(20); doc.text("TON GROSS REPORT", 105, 15, { align: 'center' });
        doc.setFontSize(12); doc.text(`Shift: ${time} | Date: ${date}`, 105, 25, { align: 'center' });

        ['ton1', 'ton2', 'ton3'].forEach((section, index) => {
            const title = "TON " + (index + 1);
            const rows = document.getElementById(`body-${section}`).rows;
            const data = [];
            for (let i = 0; i < rows.length; i++) {
                const l = rows[i].cells[0].innerText;
                const v = rows[i].cells[1].querySelector('input').value;
                if(v) data.push([l, v]);
            }
            data.push([{ content: 'TOTAL', styles: { fontStyle: 'bold' }}, document.getElementById(`total-${section}`).innerText]);
            data.push([{ content: 'HITS', styles: { fontStyle: 'bold', textColor: [255, 0, 0] }}, document.getElementById(`hits-${section}`).value]);

            doc.autoTable({
                startY: 35, head: [[{ content: title, colSpan: 2, styles: { halign: 'center', fillColor: [0, 123, 255] } }]],
                body: data, theme: 'grid', margin: { left: (index * 65) + 10 }, tableWidth: 60, styles: { fontSize: 8 }
            });
        });
        doc.save(`TON_Report_${time}_${date}.pdf`);
    }
</script>
</body>
</html>
