<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Gross Reporting System</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        .header-inputs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; background: #e9ecef; padding: 15px; border-radius: 8px; }
        .header-inputs div { flex: 1; min-width: 140px; }
        
        .upload-section { margin-bottom: 20px; padding: 20px; background: #fff3cd; border: 2px dashed #856404; border-radius: 10px; text-align: center; }
        .btn-scan { background: #856404; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #scanStatus { color: #856404; font-weight: bold; margin-top: 8px; font-size: 14px; }

        .tables-container { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .tables-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; } }

        .ton-section { border: 1px solid #ddd; border-radius: 8px; background: #fff; overflow: hidden; }
        .ton-header { background: #007bff; color: white; padding: 12px; text-align: center; font-size: 1.1rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .btn-clear-mini { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 5px; text-align: left; border-bottom: 1px solid #eee; }
        
        input[type="number"], select, input[type="date"] { 
            width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 10px; 
            box-sizing: border-box; font-size: 16px; 
        }
        .row-label { font-weight: bold; width: 60px; text-align: center; color: #555; font-size: 14px; background: #f8f9fa; display: inline-block; padding: 8px 0; border-radius: 4px; }
        
        .footer-row { font-weight: bold; background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-save { background: #007bff; color: white; border: none; padding: 18px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .btn-image { background: #dc3545; color: white; border: none; padding: 18px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .btn-load { grid-column: span 2; background: #ff9800; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-exit { grid-column: span 2; background: #e67e22; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px;}
        
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 80%; width: 300px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .modal-btn { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }

        #imageReportArea { position: absolute; left: -9999px; top: -9999px; width: 1200px; background: white; padding: 40px; }
        #imageReportArea.active { position: static; left: 0; top: 0; display: block; }
        .ir-header { text-align: center; margin-bottom: 30px; border-bottom: 4px solid #007bff; padding-bottom: 20px; }
        .ir-header h1 { margin: 0; font-size: 42px; color: #222; }
        .ir-meta { color: #444; font-size: 22px; margin-top: 10px; font-weight: bold; }
        .ir-table-group { display: flex; flex-direction: row; gap: 25px; align-items: flex-start; }
        .ir-ton-col { flex: 1; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; }
        .ir-ton-title { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 24px; }
        .ir-table { width: 100%; border-collapse: collapse; font-size: 18px; }
        .ir-table td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .ir-val { text-align: right; font-family: monospace; font-weight: bold; font-size: 20px; }
        .ir-label { font-weight: bold; color: #333; width: 80px; background: #f9f9f9; }
        .ir-footer { background: #eee; font-weight: 900; border-top: 3px solid #ccc; }
        .ir-hits { color: #b21f2d; font-weight: 900; background: #fff0f0; }
    </style>
</head>
<body>

<div class="container">
    <h1>TON GROSS TRACKER</h1>
    
    <div class="header-inputs">
        <div><label><b>Shift:</b></label>
            <select id="shiftTime">
                <option value="2PM">2 PM</option>
                <option value="5PM">5 PM</option>
                <option value="9PM" selected>9 PM</option>
            </select>
        </div>
        <div><label><b>Date:</b></label><input type="date" id="reportDate"></div>
    </div>

    <!-- Precision Scanner -->
    <div class="upload-section">
        <b>UPLOAD PREVIOUS REPORT IMAGE</b><br>
        <input type="file" id="imageUpload" accept="image/*" style="margin-top:10px;"><br>
        <button class="btn-scan" onclick="startPrecisionScan()">RUN PRECISION SCAN</button>
        <div id="scanStatus">Ready</div>
    </div>

    <div class="tables-container">
        <!-- TON 1 -->
        <div class="ton-section">
            <div class="ton-header"><span>TON 1</span><button class="btn-clear-mini" onclick="clearSection('ton1')">CLEAR</button></div>
            <table id="table-ton1"><tbody id="body-ton1"></tbody></table>
            <button class="btn-add" onclick="addRow('ton1')">+ Add Row</button>
            <div class="footer-row"><span>TOTAL:</span> <span id="total-ton1">0.00</span></div>
            <div class="footer-row"><span>HITS:</span> <input type="number" step="any" id="hits-ton1" class="hits-input" value="0" oninput="markUnsaved('ton1')"></div>
        </div>

        <!-- TON 2 -->
        <div class="ton-section">
            <div class="ton-header"><span>TON 2</span><button class="btn-clear-mini" onclick="clearSection('ton2')">CLEAR</button></div>
            <table id="table-ton2"><tbody id="body-ton2"></tbody></table>
            <button class="btn-add" onclick="addRow('ton2')">+ Add Row</button>
            <div class="footer-row"><span>TOTAL:</span> <span id="total-ton2">0.00</span></div>
            <div class="footer-row"><span>HITS:</span> <input type="number" step="any" id="hits-ton2" class="hits-input" value="0" oninput="markUnsaved('ton2')"></div>
        </div>

        <!-- TON 3 -->
        <div class="ton-section">
            <div class="ton-header"><span>TON 3</span><button class="btn-clear-mini" onclick="clearSection('ton3')">CLEAR</button></div>
            <table id="table-ton3"><tbody id="body-ton3"></tbody></table>
            <button class="btn-add" onclick="addRow('ton3')">+ Add Row</button>
            <div class="footer-row"><span>TOTAL:</span> <span id="total-ton3">0.00</span></div>
            <div class="footer-row"><span>HITS:</span> <input type="number" step="any" id="hits-ton3" class="hits-input" value="0" oninput="markUnsaved('ton3')"></div>
        </div>
    </div>

    <div class="action-btns">
        <button class="btn-save" onclick="saveToSheet()">SAVE TO SHEET</button>
        <button class="btn-image" onclick="generateImageReport()">GENERATE LONG IMAGE</button>
        <button class="btn-load" onclick="loadFromSheet()">LOAD DATA</button>
        <button class="btn-exit" onclick="handleExit()">SAVE & EXIT APP</button>
    </div>
</div>

<div id="imageReportArea">
    <div class="ir-header"><h1>TON GROSS REPORT</h1><div class="ir-meta" id="irMeta"></div></div>
    <div class="ir-table-group">
        <div class="ir-ton-col"><div class="ir-ton-title">TON 1</div><table class="ir-table"><tbody id="irBody-ton1"></tbody></table></div>
        <div class="ir-ton-col"><div class="ir-ton-title">TON 2</div><table class="ir-table"><tbody id="irBody-ton2"></tbody></table></div>
        <div class="ir-ton-col"><div class="ir-ton-title">TON 3</div><table class="ir-table"><tbody id="irBody-ton3"></tbody></table></div>
    </div>
</div>

<div id="saveModal" class="modal-overlay">
    <div class="modal-content"><h2 id="modalTitle"></h2><p id="modalMsg"></p><button id="modalBtn" class="modal-btn" style="display:none;" onclick="closeModal()">Close</button></div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNFoUi82DBfDYIMaIrFCaOjtjtrf1KWewgWlKEpoixGEYWEmz6QCikfmYigoWGAxbm5w/exec';
    let hasUnsavedChanges = false;

    document.getElementById('reportDate').valueAsDate = new Date();

    // --- OCR PRECISION SCAN LOGIC ---
    async function startPrecisionScan() {
        const fileInput = document.getElementById('imageUpload');
        if (!fileInput.files[0]) return alert("Select an image first");
        
        const status = document.getElementById('scanStatus');
        status.innerText = "Analyzing Columns, Date & Shift... Please wait.";

        const img = new Image();
        img.src = URL.createObjectURL(fileInput.files[0]);
        
        img.onload = async () => {
            const sections = ['ton1', 'ton2', 'ton3'];
            const sectionWidth = img.width / 3;

            sections.forEach(s => {
                document.getElementById(`body-${s}`).innerHTML = "";
                document.getElementById(`hits-${s}`).value = 0;
            });

            for (let i = 0; i < sections.length; i++) {
                status.innerText = `Scanning Column ${i + 1}...`;
                const canvas = document.createElement('canvas');
                canvas.width = sectionWidth;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, i * sectionWidth, 0, sectionWidth, img.height, 0, 0, sectionWidth, img.height);
                
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                parseOcrResult(text, sections[i]);
            }
            
            status.innerText = "Scan Complete!";
            hasUnsavedChanges = true;
        };
    }

    function parseOcrResult(text, sectionId) {
        const upperText = text.toUpperCase();

        // 1. Shift Detection
        const shiftSelect = document.getElementById('shiftTime');
        if (upperText.includes("2PM") || upperText.includes("2 PM")) shiftSelect.value = "2PM";
        else if (upperText.includes("5PM") || upperText.includes("5 PM")) shiftSelect.value = "5PM";
        else if (upperText.includes("9PM") || upperText.includes("9 PM")) shiftSelect.value = "9PM";

        // 2. Date Detection
        const dateRegex = /(\d{1,4}[-/.]\d{1,2}[-/.]\d{1,4})/; 
        const dateMatch = text.match(dateRegex);
        if (dateMatch) {
            const foundDate = new Date(dateMatch[1]);
            if (!isNaN(foundDate.getTime())) {
                const formattedDate = foundDate.toISOString().split('T')[0];
                document.getElementById('reportDate').value = formattedDate;
            }
        }

        // 3. Data Parsing
        const lines = text.split('\n');
        lines.forEach(line => {
            const clean = line.replace(/,|\$/g, '').trim();
            const match = clean.match(/(\d+\.\d{2})/);
            
            if (match && !clean.toUpperCase().includes("TOTAL")) {
                addRow(sectionId, match[1]);
            }
            
            if (clean.toUpperCase().includes("HITS")) {
                const hitsMatch = clean.match(/(\d+)/);
                if (hitsMatch) document.getElementById(`hits-${sectionId}`).value = hitsMatch[1];
            }
        });
        calculate(sectionId);
    }

    // --- CORE UI FUNCTIONS ---
    function markUnsaved(section) {
        hasUnsavedChanges = true;
        calculate(section);
    }

    function addRow(section, val = "") {
        const tbody = document.getElementById(`body-${section}`);
        const rowCount = tbody.rows.length + 1;
        const row = tbody.insertRow();
        row.innerHTML = `<td style="width:70px"><span class="row-label">P${rowCount}</span></td>
                         <td><input type="number" step="any" inputmode="decimal" value="${val}" class="val-${section}" oninput="markUnsaved('${section}')"></td>`;
    }

    function calculate(section) {
        let total = 0;
        const inputs = document.querySelectorAll(`.val-${section}`);
        inputs.forEach(i => {
            const val = parseFloat(i.value);
            if (!isNaN(val)) total += val;
        });
        const totalElem = document.getElementById(`total-${section}`);
        if (totalElem) totalElem.innerText = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function clearSection(section) {
        if(confirm(`Reset ${section.toUpperCase()}?`)) {
            document.getElementById(`body-${section}`).innerHTML = "";
            document.getElementById(`hits-${section}`).value = 0;
            calculate(section);
        }
    }

    function showModal(t, m, b) {
        document.getElementById('saveModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalMsg').innerText = m;
        document.getElementById('modalBtn').style.display = b ? 'inline-block' : 'none';
    }
    function closeModal() { document.getElementById('saveModal').style.display = 'none'; }

    // --- DATA ACTIONS ---
    async function saveToSheet() {
        showModal("Saving...", "Recording to Google Sheets.", false);
        const date = document.getElementById('reportDate').value;
        const shift = document.getElementById('shiftTime').value;
        let payload = [];
        ['ton1', 'ton2', 'ton3'].forEach((secId, idx) => {
            const title = "TON " + (idx + 1);
            document.querySelectorAll(`.val-${secId}`).forEach((input, i) => {
                if(input.value) payload.push({ date: date, shift: shift, category: title, label: `P${i+1}`, value: input.value });
            });
            const hits = document.getElementById(`hits-${secId}`).value;
            if(hits && hits != 0) payload.push({ date: date, shift: shift, category: title, label: 'HITS', value: hits });
        });
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            hasUnsavedChanges = false;
            showModal("Success!", "Data saved to Sheets.", true);
        } catch (e) { showModal("Error", "Save failed.", true); }
    }

    async function loadFromSheet() {
        const d = document.getElementById('reportDate').value;
        const s = document.getElementById('shiftTime').value;
        showModal("Loading...", "Fetching data...", false);
        try {
            const res = await fetch(`${SCRIPT_URL}?date=${d}&shift=${s}`);
            const data = await res.json();
            if (!data || data.length === 0) { showModal("Not Found", "No records found.", true); return; }
            
            ['ton1', 'ton2', 'ton3'].forEach(sec => {
                document.getElementById(`body-${sec}`).innerHTML = "";
                document.getElementById(`hits-${sec}`).value = 0;
            });

            data.forEach(item => {
                let sec = item.category.toLowerCase().replace(" ", "");
                if (item.label === "HITS") { 
                    document.getElementById(`hits-${sec}`).value = item.value; 
                } else {
                    addRow(sec, item.value);
                }
            });
            ['ton1', 'ton2', 'ton3'].forEach(calculate);
            showModal("Loaded!", "Data filled.", true);
            hasUnsavedChanges = false;
        } catch (e) { showModal("Error", "Load failed.", true); }
    }

    function generateImageReport() {
        const time = document.getElementById('shiftTime').value;
        const date = document.getElementById('reportDate').value;
        showModal("Generating...", "Drawing large report image...", false);
        document.getElementById('irMeta').innerText = `SHIFT: ${time} | DATE: ${date}`;
        
        ['ton1', 'ton2', 'ton3'].forEach(sec => {
            const irBody = document.getElementById(`irBody-${sec}`);
            irBody.innerHTML = "";
            document.querySelectorAll(`.val-${sec}`).forEach((input, i) => {
                if(input.value) irBody.innerHTML += `<tr><td class="ir-label">P${i+1}</td><td class="ir-val">${parseFloat(input.value).toLocaleString(undefined, {minimumFractionDigits: 2})}</td></tr>`;
            });
            irBody.innerHTML += `<tr class="ir-footer"><td class="ir-label">TOTAL</td><td class="ir-val">${document.getElementById(`total-${sec}`).innerText}</td></tr>`;
            const h = document.getElementById(`hits-${sec}`).value;
            if(h && h != 0) irBody.innerHTML += `<tr><td class="ir-label ir-hits">HITS</td><td class="ir-val ir-hits">${parseFloat(h).toLocaleString()}</td></tr>`;
        });

        const area = document.getElementById('imageReportArea');
        area.classList.add('active');
        html2canvas(area, { scale: 1.5, windowWidth: 1200 }).then(canvas => {
            area.classList.remove('active');
            const link = document.createElement('a');
            link.download = `Report_${date}.png`;
            link.href = canvas.toDataURL();
            link.click();
            showModal("Done!", "Image downloaded.", true);
        });
    }

    async function handleExit() {
        if (hasUnsavedChanges && confirm("Save changes before exiting?")) {
            await saveToSheet();
        }
        window.close();
    }
</script>
</body>
</html>
